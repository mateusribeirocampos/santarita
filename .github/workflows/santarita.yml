name: Supabase Ping
permissions:
  contents: read
  actions: read

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  supabase-ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabase Health Check
        run: |
          # GET /rest/v1/ retorna o schema OpenAPI — não precisa de tabela específica
          response=$(curl -s -w "%{http_code}" \
                -H "apikey: ${{ secrets.SUPABASE_SANTARITA_KEY }}" \
                -H "Authorization: Bearer ${{ secrets.SUPABASE_SANTARITA_KEY }}" \
                "${{ secrets.SUPABASE_API_URL }}" \
                -o /tmp/response.json)

          echo "Health check response: $response"

          if [[ "$response" =~ ^2[0-9][0-9]$ ]]; then
            echo "Supabase is healthy"
          else
            echo "Supabase health check failed with status code $response"
            cat /tmp/response.json
            exit 1
          fi
